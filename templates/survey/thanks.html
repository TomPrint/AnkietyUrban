{% extends "base.html" %}

{% block title %}Completed | Ankiety Urban{% endblock %}

{% block content %}
<main class="mx-auto max-w-2xl px-4 pb-10 pt-3 sm:px-6">
  <section class="rounded-2xl bg-white p-8 text-center shadow-lg">
    <h1 class="text-2xl font-bold">Thank you</h1>
    <p class="mt-3 text-slate-600">
      Survey for {{ session.customer.company_name }} is completed.
    </p>
    <div class="mt-6 flex flex-col items-center gap-2">
      <button type="button" class="rounded-lg bg-slate-900 px-5 py-2.5 text-base font-semibold text-white" onclick="window.location.href='https://urban-vision.pl';">
        Back
      </button>
      <a class="rounded-lg border border-slate-300 px-4 py-1.5 text-sm font-semibold" href="{% url 'survey-by-token' session.token %}?edit=1">
        Edit and Submit Survey Again
      </a>
    </div>
  </section>
</main>
{% endblock %}
