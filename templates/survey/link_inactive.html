{% extends "base.html" %}

{% block title %}Link nieaktywny | Ankiety Urban{% endblock %}

{% block content %}
<main class="mx-auto max-w-2xl px-4 py-10 sm:px-6">
  <section class="rounded-2xl bg-white p-8 text-center shadow-lg">
    <h1 class="text-2xl font-bold">Link do ankiety jest nieaktywny</h1>
    <p class="mt-3 text-slate-600">
      Ten link do ankiety został dezaktywowany przez administratora.
    </p>
    <p class="mt-1 text-sm text-slate-500">
      Firma: {{ session_customer_name|default:session.customer.company_name }}
    </p>
  </section>
</main>
{% endblock %}
