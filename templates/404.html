{% extends "base.html" %}

{% block title %}Nie znaleziono strony | Ankiety Urban{% endblock %}

{% block content %}
<main class="mx-auto max-w-3xl px-6 py-14">
  <section class="rounded-2xl bg-white p-8 text-center shadow-lg">
    <p class="text-sm uppercase tracking-[0.2em] text-slate-500">Error 404</p>
    <h1 class="mt-3 text-3xl font-bold">Nie znaleziono strony</h1>
    <p class="mt-4 text-slate-600">
      Szukana strona nie istnieje lub link nie jest już prawidłowy.
    </p>
    <div class="mt-6 flex flex-col items-center gap-3 sm:flex-row sm:justify-center">
      <a class="rounded-lg border border-slate-300 px-4 py-2 font-semibold" href="{% url 'management-dashboard' %}">
        Przejdź do panelu
      </a>
      <a class="rounded-lg border border-slate-300 px-4 py-2 font-semibold" href="{% url 'login' %}">
        Przejdź do logowania
      </a>

  </section>
</main>
