{% extends "base.html" %}

{% block title %}{{ title }} | Ankiety Urban{% endblock %}

{% block content %}
<main class="mx-auto max-w-3xl px-4 py-6 sm:px-6 sm:py-10">
  <section class="rounded-2xl bg-white p-6 shadow">
    <h1 class="text-2xl font-bold">{{ title }}</h1>
    <form method="post" class="mt-6 space-y-5">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="mb-1 block text-sm font-medium" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p class="mt-1 text-sm text-red-700">{{ field.errors|join:", " }}</p>{% endif %}
      </div>
      {% endfor %}
      <div class="flex gap-3">
        <button class="rounded-lg bg-slate-900 px-4 py-2 font-semibold text-white" type="submit">Save</button>
        <a class="rounded-lg border border-slate-300 px-4 py-2 font-semibold" href="{% url 'management-templates' %}">Cancel</a>
      </div>
    </form>
  </section>
</main>
{% endblock %}
